events {
    worker_processes 1;
}

http {
    # Redireciona HTTP → HTTPS
    server {
        listen 80;
        server_name SEU_SUBDOMINIO.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name SEU_SUBDOMINIO.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/SEU_SUBDOMINIO.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SEU_SUBDOMINIO.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Limita tamanho de requests (segurança)
        client_max_body_size 1m;

        location / {
            proxy_pass         http://bot:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
